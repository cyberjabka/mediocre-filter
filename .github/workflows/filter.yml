name: Filter RU keys

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and filter
        run: |
          curl -s "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | \
          python3 -c "
          import sys, urllib.parse
          for line in sys.stdin:
              line = line.strip()
              if not line:
                  continue
              if '#' in line:
                  fragment = urllib.parse.unquote(line.split('#', 1)[1])
                  if '\U0001f1f7\U0001f1fa' in fragment:
                      print(line)
          " > filtered.txt
          echo "Filtered: $(wc -l < filtered.txt) keys"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add filtered.txt
          git diff --cached --quiet || git commit -m "Update $(date -u '+%Y-%m-%d')"
          git push
